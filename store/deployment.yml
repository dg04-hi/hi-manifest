# store-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: store
  namespace: ns-hiorder
spec:
  replicas: 2
  selector:
    matchLabels:
      app: store
  template:
    metadata:
      labels:
        app: store
    spec:
      enableServiceLinks: false
      containers:
        - name: store
          image: acrdigitalgarage03.azurecr.io/hiorder/store:latest
          ports:
            - containerPort: 8082
          env:
            # Spring Boot 설정
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx1024m"
                  
            # Redis 연결 설정
            - name: REDIS_HOST
              value: "redis-service.hi-redis.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
              
            # JPA 설정
            - name: JPA_DDL_AUTO
              value: "validate"
            - name: JPA_SHOW_SQL
              value: "false"
              
            # 외부 API 연동 설정
            - name: NAVER_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: store-api-secret
                  key: naver-client-id
            - name: NAVER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: store-api-secret
                  key: naver-client-secret
            - name: KAKAO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: store-api-secret
                  key: kakao-api-key
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: store-api-secret
                  key: google-api-key
            - name: HIORDER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: store-api-secret
                  key: hiorder-api-key
            - name: HIORDER_BASE_URL
              value: "https://api.hiorder.com"
              
            # Kubernetes 자동 환경변수 비활성화
            - name: KUBERNETES_SERVICE_HOST
              value: ""
            - name: KUBERNETES_SERVICE_PORT
              value: ""
              
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1024Mi"
              cpu: "500m"
              
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            
          # 외부 API 호출을 위한 네트워크 정책
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL