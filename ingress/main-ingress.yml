apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hiorder-main-ingress
  namespace: ns-hiorder
  annotations:
    # 기본 Nginx 설정 (rewrite 제거 - 각 서비스가 자체 처리)
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    
    # 파일 업로드를 위한 설정 (리뷰 서비스용)
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/client-max-body-size: "50m"
    
    # 타임아웃 설정 (외부 API 호출 고려)
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    
    # 기본 Rate Limiting
    nginx.ingress.kubernetes.io/rate-limit-requests-per-second: "100"
    nginx.ingress.kubernetes.io/rate-limit-connections: "200"
    
    # CORS 설정
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    
    # 보안 헤더
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "X-Robots-Tag: noindex, nofollow";
      
    # 특별 경로별 Rate Limiting
    nginx.ingress.kubernetes.io/server-snippet: |
      # 헬스체크는 제한 없음
      location ~* ^/(health|actuator)/ {
        access_log off;
        limit_req off;
      }
      # 인증 API는 엄격하게 제한
      location ~* ^/api/auth/ {
        limit_req zone=auth burst=5 nodelay;
      }
      # 파일 업로드는 관대하게
      location ~* ^/api/files/ {
        limit_req zone=upload burst=20 nodelay;
      }

spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.hiorder.com
    secretName: hiorder-api-tls-secret
  rules:
  - host: api.hiorder.com
    http:
      paths:
      
      # ==============================================
      # 📱 MEMBER SERVICE (회원 관리) - Port 8081
      # ==============================================
      # 인증 관련 API (가장 높은 우선순위)
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: member-service
            port:
              number: 8081
              
      # 회원 관리 API
      - path: /api/members
        pathType: Prefix
        backend:
          service:
            name: member-service
            port:
              number: 8081
              
      # 구독 관리 API
      - path: /api/subscriptions
        pathType: Prefix
        backend:
          service:
            name: member-service
            port:
              number: 8081
              
      # ==============================================
      # 🏪 STORE SERVICE (매장 운영) - Port 8082
      # ==============================================
      # 매장 관리 API
      - path: /api/stores
        pathType: Prefix
        backend:
          service:
            name: store-service
            port:
              number: 8082
              
      # 메뉴 관리 API
      - path: /api/menus
        pathType: Prefix
        backend:
          service:
            name: store-service
            port:
              number: 8082
              
      # 외부 플랫폼 연동 API
      - path: /api/external
        pathType: Prefix
        backend:
          service:
            name: store-service
            port:
              number: 8082
              
      # ==============================================
      # 📝 REVIEW SERVICE (리뷰 관리) - Port 8083
      # ==============================================
      # 리뷰 관리 API
      - path: /api/reviews
        pathType: Prefix
        backend:
          service:
            name: review-service
            port:
              number: 8083
              
      # 파일 업로드 API
      - path: /api/files
        pathType: Prefix
        backend:
          service:
            name: review-service
            port:
              number: 8083
              
      # ==============================================
      # 🤖 ANALYTICS SERVICE (AI 분석) - Port 8084
      # ==============================================
      # AI 분석 API
      - path: /api/analytics
        pathType: Prefix
        backend:
          service:
            name: analytics-service
            port:
              number: 8084
              
      # 실행 계획 API
      - path: /api/action-plans
        pathType: Prefix
        backend:
          service:
            name: analytics-service
            port:
              number: 8084
              
      # ==============================================
      # 🎯 RECOMMEND SERVICE (취향 추천) - Port 8085
      # ==============================================
      # 추천 API
      - path: /api/recommend
        pathType: Prefix
        backend:
          service:
            name: recommend-service
            port:
              number: 8085
              
      # ==============================================
      # 📚 DEVELOPER TOOLS (개발자 도구)
      # ==============================================
      # API 문서 통합 페이지
      - path: /docs
        pathType: Prefix
        backend:
          service:
            name: member-service
            port:
              number: 8081
          
      # 각 서비스별 Swagger UI
      - path: /docs/member
        pathType: Prefix  
        backend:
          service:
            name: member-service
            port:
              number: 8081
              
      - path: /docs/store
        pathType: Prefix
        backend:
          service:
            name: store-service
            port:
              number: 8082
              
      - path: /docs/review
        pathType: Prefix
        backend:
          service:
            name: review-service
            port:
              number: 8083
              
      - path: /docs/analytics
        pathType: Prefix
        backend:
          service:
            name: analytics-service
            port:
              number: 8084
              
      - path: /docs/recommend
        pathType: Prefix
        backend:
          service:
            name: recommend-service
            port:
              number: 8085
              
      # ==============================================
      # 💊 HEALTH CHECKS (헬스체크)
      # ==============================================
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: member-service
            port:
              number: 8081
              
      # 개별 서비스 헬스체크
      - path: /actuator
        pathType: Prefix
        backend:
          service:
            name: member-service
            port:
              number: 8081
              
      # ==============================================
      # 🏠 DEFAULT ROUTES
      # ==============================================
      # API 상태 확인용 기본 경로
      - path: /
        pathType: Prefix
        backend:
          service:
            name: member-service
            port:
              number: 8081